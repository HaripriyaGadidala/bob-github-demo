name: Create Jira Ticket from Pull Request

on:
  pull_request:
    types: [opened]

jobs:
  create-jira-ticket:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Create Jira Issue
        id: create
        uses: atlassian/gajira-create@v3
        with:
          project: ${{ secrets.JIRA_PROJECT_KEY }}
          issuetype: Task
          summary: "[PR #${{ github.event.pull_request.number }}] ${{ github.event.pull_request.title }}"
          description: |
            h2. Pull Request Details
            
            *PR Number:* #${{ github.event.pull_request.number }}
            *Author:* ${{ github.event.pull_request.user.login }}
            *Branch:* {{${{ github.event.pull_request.head.ref }}}} → {{${{ github.event.pull_request.base.ref }}}}
            *URL:* ${{ github.event.pull_request.html_url }}
            
            h2. Description
            ${{ github.event.pull_request.body || 'No description provided' }}
            
            h2. Changes
            * Commits: ${{ github.event.pull_request.commits }}
            * Files Changed: ${{ github.event.pull_request.changed_files }}
            * Additions: +${{ github.event.pull_request.additions }}
            * Deletions: -${{ github.event.pull_request.deletions }}
            
            h2. Tasks
            * Review code changes
            * Test functionality
            * Approve PR
            * Merge to ${{ github.event.pull_request.base.ref }}
          fields: '{"labels": ["pull-request", "github", "automated"]}'

      - name: Log created issue
        run: |
          echo "✅ Created Jira issue: ${{ steps.create.outputs.issue }}"
          echo "🔗 URL: ${{ secrets.JIRA_BASE_URL }}/browse/${{ steps.create.outputs.issue }}"

      - name: Comment on PR with Jira link
        uses: actions/github-script@v7
        with:
          script: |
            const jiraIssue = '${{ steps.create.outputs.issue }}';
            const jiraUrl = '${{ secrets.JIRA_BASE_URL }}';
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Jira Ticket Created**\n\n🎫 [${jiraIssue}](${jiraUrl}/browse/${jiraIssue})\n\nThis PR is now tracked in Jira. Use the ticket for:\n- Task tracking\n- Review comments\n- Status updates\n- Documentation`
            });

      - name: Add Jira link to PR title and description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const jiraIssue = '${{ steps.create.outputs.issue }}';
            const jiraUrl = '${{ secrets.JIRA_BASE_URL }}';
            
            // Update PR title to include Jira ticket ID
            const updatedTitle = `[${jiraIssue}] ${pr.title}`;
            
            // Update PR body to include Jira link
            const updatedBody = `${pr.body || ''}\n\n---\n\n**Jira Ticket:** [${jiraIssue}](${jiraUrl}/browse/${jiraIssue})`;
            
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              title: updatedTitle,
              body: updatedBody
            });

