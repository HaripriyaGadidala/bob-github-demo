name: Create JIRA Issue on PR

on:
  pull_request:
    types: [opened, reopened]

jobs:
  create-jira-issue:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # Step 1: Create Jira issue via REST API
      # ----------------------------------------------------------------
      - name: Create Jira Issue
        id: create_issue
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          # Strip any trailing slash or whitespace from JIRA_BASE_URL
          JIRA_BASE_URL=$(echo "$JIRA_BASE_URL" | tr -d '[:space:]' | sed 's|/$||')

          SUMMARY="PR #${PR_NUMBER}: ${PR_TITLE}"
          DESCRIPTION="Pull Request: ${PR_URL}\n\nAuthor: ${PR_AUTHOR}\nBranch: ${PR_HEAD} -> ${PR_BASE}"

          PAYLOAD=$(jq -n \
            --arg summary "$SUMMARY" \
            --arg description "$DESCRIPTION" \
            '{
              fields: {
                project: { key: "DEV" },
                issuetype: { name: "Task" },
                summary: $summary,
                description: {
                  type: "doc",
                  version: 1,
                  content: [{
                    type: "paragraph",
                    content: [{ type: "text", text: $description }]
                  }]
                }
              }
            }')

          # --http1.1 prevents curl exit code 43 (HTTP/2 stream error with Atlassian)
          # base64 -w 0 prevents newline in encoded string which corrupts the Authorization header
          AUTH=$(printf '%s:%s' "${JIRA_USER_EMAIL}" "${JIRA_API_TOKEN}" | base64 -w 0)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --http1.1 \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data "$PAYLOAD" \
            "${JIRA_BASE_URL}/rest/api/3/issue")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body: $BODY"

          if [ "$HTTP_CODE" -eq 201 ]; then
            ISSUE_KEY=$(echo "$BODY" | jq -r '.key')
            echo "✅ Jira issue created: $ISSUE_KEY"
            echo "issue_key=$ISSUE_KEY" >> $GITHUB_OUTPUT
          else
            echo "❌ Failed to create Jira issue. HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

      # ----------------------------------------------------------------
      # Step 2: Comment on the PR with the Jira issue link
      # ----------------------------------------------------------------
      - name: Comment PR with Jira Issue link
        if: success() && steps.create_issue.outputs.issue_key != ''
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        with:
          script: |
            const issueKey = '${{ steps.create_issue.outputs.issue_key }}';
            const jiraUrl = process.env.JIRA_BASE_URL;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Jira issue created: **[${issueKey}](${jiraUrl}/browse/${issueKey})**`
            });

