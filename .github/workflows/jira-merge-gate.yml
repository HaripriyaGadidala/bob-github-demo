name: Jira Merge Gate

# Runs on every push to a PR and blocks merge until linked Jira ticket is Done/Closed
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-jira-status:
    name: Jira ticket must be Done before merge
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # Step 1: Find the Jira issue key linked to this PR
      # Looks for a pattern like DEV-123 in the PR title or body
      # ----------------------------------------------------------------
      - name: Extract Jira Issue Key from PR
        id: extract_key
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          COMBINED="${PR_TITLE} ${PR_BODY}"
          # Match Jira issue key pattern: 2-10 uppercase letters, dash, digits (e.g. DEV-3, BOB-42)
          ISSUE_KEY=$(echo "$COMBINED" | grep -oE '[A-Z]{2,10}-[0-9]+' | head -1)

          if [ -z "$ISSUE_KEY" ]; then
            echo "⚠️  No Jira issue key found in PR title or body."
            echo "    Add a Jira issue key (e.g. DEV-123) to your PR title or description."
            echo "issue_key=" >> $GITHUB_OUTPUT
          else
            echo "✅ Found Jira issue key: $ISSUE_KEY"
            echo "issue_key=$ISSUE_KEY" >> $GITHUB_OUTPUT
          fi

      # ----------------------------------------------------------------
      # Step 2: Check Jira ticket status via REST API
      # Fails if the ticket is not Done / Closed
      # ----------------------------------------------------------------
      - name: Check Jira Ticket Status
        id: check_status
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ steps.extract_key.outputs.issue_key }}
        run: |
          if [ -z "$ISSUE_KEY" ]; then
            echo "⚠️  Skipping Jira status check — no issue key found."
            echo "    Please include a Jira issue key (e.g. DEV-123) in the PR title or body to enable this gate."
            exit 1
          fi

          # Strip trailing slash
          JIRA_BASE_URL=$(echo "$JIRA_BASE_URL" | tr -d '[:space:]' | sed 's|/$||')

          # Build auth header (base64 -w 0 prevents newline corruption)
          AUTH=$(printf '%s:%s' "${JIRA_USER_EMAIL}" "${JIRA_API_TOKEN}" | base64 -w 0)

          echo "Fetching status for Jira issue: $ISSUE_KEY ..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --http1.1 \
            -H "Authorization: Basic ${AUTH}" \
            -H "Accept: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${ISSUE_KEY}?fields=status,summary")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Failed to fetch Jira issue $ISSUE_KEY. HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

          STATUS=$(echo "$BODY" | jq -r '.fields.status.name')
          STATUS_CATEGORY=$(echo "$BODY" | jq -r '.fields.status.statusCategory.key')
          SUMMARY=$(echo "$BODY" | jq -r '.fields.summary')

          echo ""
          echo "Jira Issue  : $ISSUE_KEY"
          echo "Summary     : $SUMMARY"
          echo "Status      : $STATUS"
          echo "Category    : $STATUS_CATEGORY"
          echo ""

          # Allow merge only if status category is 'done'
          if [ "$STATUS_CATEGORY" = "done" ]; then
            echo "✅ Jira ticket $ISSUE_KEY is '$STATUS' — merge allowed."
          else
            echo "🚫 MERGE BLOCKED: Jira ticket $ISSUE_KEY is '$STATUS'."
            echo "   Close or resolve the Jira ticket before merging this PR."
            exit 1
          fi

