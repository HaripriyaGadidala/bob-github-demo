name: Bob Agent - Auto PR & Jira Creation

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
      - 'enhancement/**'
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch to create PR from'
        required: true
        type: string
      target_branch:
        description: 'Target branch for PR'
        required: false
        default: 'main'
        type: string

jobs:
  auto-create-pr-and-jira:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch_name || github.ref }}

      - name: Get branch information
        id: branch_info
        run: |
          CURRENT_BRANCH="${{ github.event.inputs.branch_name || github.ref_name }}"
          TARGET_BRANCH="${{ github.event.inputs.target_branch || 'main' }}"
          
          echo "current_branch=$CURRENT_BRANCH" >> $GITHUB_OUTPUT
          echo "target_branch=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          
          # Extract feature name from branch
          FEATURE_NAME=$(echo "$CURRENT_BRANCH" | sed 's/.*\///' | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
          echo "feature_name=$FEATURE_NAME" >> $GITHUB_OUTPUT
          
          # Get commit messages
          COMMITS=$(git log origin/$TARGET_BRANCH..HEAD --pretty=format:"- %s" | head -10)
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Get file changes
          FILES_CHANGED=$(git diff --name-only origin/$TARGET_BRANCH...HEAD | wc -l)
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT
          
          # Get additions and deletions
          STATS=$(git diff --shortstat origin/$TARGET_BRANCH...HEAD)
          ADDITIONS=$(echo "$STATS" | grep -oP '\d+(?= insertion)' || echo "0")
          DELETIONS=$(echo "$STATS" | grep -oP '\d+(?= deletion)' || echo "0")
          echo "additions=$ADDITIONS" >> $GITHUB_OUTPUT
          echo "deletions=$DELETIONS" >> $GITHUB_OUTPUT

      - name: Check if PR already exists
        id: check_pr
        run: |
          CURRENT_BRANCH="${{ steps.branch_info.outputs.current_branch }}"
          TARGET_BRANCH="${{ steps.branch_info.outputs.target_branch }}"
          
          PR_EXISTS=$(gh pr list --head "$CURRENT_BRANCH" --base "$TARGET_BRANCH" --json number --jq '.[0].number' || echo "")
          
          if [ -n "$PR_EXISTS" ]; then
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_EXISTS" >> $GITHUB_OUTPUT
            echo "✅ PR already exists: #$PR_EXISTS"
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "📝 No existing PR found"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate PR description with Bob
        id: generate_description
        if: steps.check_pr.outputs.pr_exists == 'false'
        run: |
          DESCRIPTION=$(cat << 'EOF'
          ## 🤖 Auto-generated by Bob Agent
          
          ### 📝 Changes Summary
          ${{ steps.branch_info.outputs.feature_name }}
          
          ### 📊 Statistics
          - **Files Changed:** ${{ steps.branch_info.outputs.files_changed }}
          - **Additions:** +${{ steps.branch_info.outputs.additions }}
          - **Deletions:** -${{ steps.branch_info.outputs.deletions }}
          
          ### 📋 Commits
          ${{ steps.branch_info.outputs.commits }}
          
          ### ✅ Checklist
          - [ ] Code review completed
          - [ ] Tests passing
          - [ ] Documentation updated
          - [ ] No breaking changes
          
          ### 🎯 Jira Integration
          A Jira ticket will be automatically created and linked to this PR.
          
          ---
          *This PR was automatically created by Bob Agent*
          EOF
          )
          
          echo "description<<EOF" >> $GITHUB_OUTPUT
          echo "$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create_pr
        if: steps.check_pr.outputs.pr_exists == 'false'
        run: |
          CURRENT_BRANCH="${{ steps.branch_info.outputs.current_branch }}"
          TARGET_BRANCH="${{ steps.branch_info.outputs.target_branch }}"
          FEATURE_NAME="${{ steps.branch_info.outputs.feature_name }}"
          
          PR_TITLE="[BOB-AUTO] $FEATURE_NAME"
          
          PR_NUMBER=$(gh pr create \
            --title "$PR_TITLE" \
            --body "${{ steps.generate_description.outputs.description }}" \
            --base "$TARGET_BRANCH" \
            --head "$CURRENT_BRANCH" \
            --label "bob-agent,automated" \
            | grep -oP '(?<=pull/)\d+')
          
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "✅ Created PR #$PR_NUMBER"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Create Jira Ticket
        id: create_jira
        uses: atlassian/gajira-create@v3
        with:
          project: ${{ secrets.JIRA_PROJECT_KEY }}
          issuetype: Task
          summary: "[BOB-AUTO PR #${{ steps.create_pr.outputs.pr_number || steps.check_pr.outputs.pr_number }}] ${{ steps.branch_info.outputs.feature_name }}"
          description: |
            h2. 🤖 Auto-generated by Bob Agent
            
            h3. Pull Request Details
            *PR Number:* #${{ steps.create_pr.outputs.pr_number || steps.check_pr.outputs.pr_number }}
            *Branch:* {{${{ steps.branch_info.outputs.current_branch }}}} → {{${{ steps.branch_info.outputs.target_branch }}}}
            *Author:* ${{ github.actor }}
            *Repository:* ${{ github.repository }}
            
            h3. Changes Summary
            ${{ steps.branch_info.outputs.feature_name }}
            
            h3. Statistics
            * Files Changed: ${{ steps.branch_info.outputs.files_changed }}
            * Additions: +${{ steps.branch_info.outputs.additions }}
            * Deletions: -${{ steps.branch_info.outputs.deletions }}
            
            h3. Recent Commits
            ${{ steps.branch_info.outputs.commits }}
            
            h3. Tasks
            * Review code changes
            * Run automated tests
            * Verify functionality
            * Approve and merge PR
            
            h3. Links
            * [View PR|https://github.com/${{ github.repository }}/pull/${{ steps.create_pr.outputs.pr_number || steps.check_pr.outputs.pr_number }}]
            * [View Branch|https://github.com/${{ github.repository }}/tree/${{ steps.branch_info.outputs.current_branch }}]
          fields: '{"labels": ["bob-agent", "automated", "pull-request"]}'

      - name: Update PR with Jira link
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number || steps.check_pr.outputs.pr_number }}"
          JIRA_ISSUE="${{ steps.create_jira.outputs.issue }}"
          JIRA_URL="${{ secrets.JIRA_BASE_URL }}"
          
          gh pr comment "$PR_NUMBER" --body "🎫 **Jira Ticket Created:** [$JIRA_ISSUE]($JIRA_URL/browse/$JIRA_ISSUE)

This PR is now tracked in Jira. The ticket will be automatically updated when this PR is merged or closed."
          
          echo "✅ Updated PR #$PR_NUMBER with Jira link: $JIRA_ISSUE"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          echo "## 🎉 Bob Agent Automation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Created Resources:" >> $GITHUB_STEP_SUMMARY
          echo "- **Pull Request:** #${{ steps.create_pr.outputs.pr_number || steps.check_pr.outputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Jira Ticket:** ${{ steps.create_jira.outputs.issue }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ steps.branch_info.outputs.current_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** ${{ steps.branch_info.outputs.target_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Statistics:" >> $GITHUB_STEP_SUMMARY
          echo "- Files Changed: ${{ steps.branch_info.outputs.files_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Additions: +${{ steps.branch_info.outputs.additions }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deletions: -${{ steps.branch_info.outputs.deletions }}" >> $GITHUB_STEP_SUMMARY

# Made with Bob Agent