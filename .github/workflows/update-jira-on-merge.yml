name: Update Jira Ticket on PR Merge

on:
  pull_request:
    types: [closed]

jobs:
  update-jira:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Extract Jira Issue Key from PR
        id: extract
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          
          # Try to extract from title [BGD-123] or BGD-123
          if [[ $PR_TITLE =~ \[([A-Z]+-[0-9]+)\] ]] || [[ $PR_TITLE =~ ([A-Z]+-[0-9]+) ]]; then
            echo "issue_key=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "Found issue key in title: ${BASH_REMATCH[1]}"
          # Try to extract from body
          elif [[ $PR_BODY =~ \[([A-Z]+-[0-9]+)\] ]] || [[ $PR_BODY =~ ([A-Z]+-[0-9]+) ]]; then
            echo "issue_key=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "Found issue key in body: ${BASH_REMATCH[1]}"
          else
            echo "No Jira issue key found"
            echo "issue_key=" >> $GITHUB_OUTPUT
          fi

      - name: Add Comment to Jira
        if: steps.extract.outputs.issue_key != ''
        uses: atlassian/gajira-comment@v3
        with:
          issue: ${{ steps.extract.outputs.issue_key }}
          comment: |
            ✅ *Pull Request Merged*
            
            PR #${{ github.event.pull_request.number }} has been successfully merged into {{${{ github.event.pull_request.base.ref }}}}.
            
            *Merged by:* ${{ github.event.pull_request.merged_by.login }}
            *Merged at:* ${{ github.event.pull_request.merged_at }}
            *Commits:* ${{ github.event.pull_request.commits }}
            
            [View PR|${{ github.event.pull_request.html_url }}]

      - name: Transition Jira Issue to Done
        if: steps.extract.outputs.issue_key != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ steps.extract.outputs.issue_key }}
          transition: "Done"
        continue-on-error: true

      - name: Log Update
        if: steps.extract.outputs.issue_key != ''
        run: |
          echo "✅ Updated Jira issue: ${{ steps.extract.outputs.issue_key }}"
          echo "🔗 URL: ${{ secrets.JIRA_BASE_URL }}/browse/${{ steps.extract.outputs.issue_key }}"

  update-jira-on-close:
    if: github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Extract Jira Issue Key from PR
        id: extract
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          
          if [[ $PR_TITLE =~ \[([A-Z]+-[0-9]+)\] ]] || [[ $PR_TITLE =~ ([A-Z]+-[0-9]+) ]]; then
            echo "issue_key=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          elif [[ $PR_BODY =~ \[([A-Z]+-[0-9]+)\] ]] || [[ $PR_BODY =~ ([A-Z]+-[0-9]+) ]]; then
            echo "issue_key=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "issue_key=" >> $GITHUB_OUTPUT
          fi

      - name: Add Comment to Jira
        if: steps.extract.outputs.issue_key != ''
        uses: atlassian/gajira-comment@v3
        with:
          issue: ${{ steps.extract.outputs.issue_key }}
          comment: |
            ❌ *Pull Request Closed Without Merging*
            
            PR #${{ github.event.pull_request.number }} was closed without being merged.
            
            *Closed by:* ${{ github.actor }}
            *Reason:* Not merged
            
            [View PR|${{ github.event.pull_request.html_url }}]

      - name: Transition Jira Issue to Cancelled
        if: steps.extract.outputs.issue_key != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ steps.extract.outputs.issue_key }}
          transition: "Cancelled"
        continue-on-error: true

