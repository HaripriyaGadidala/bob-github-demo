name: Close Issue when PR is Merged or Closed

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: read

jobs:
  close-related-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Find and Close Related Issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Search for the issue created for this PR
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pull-request,auto-created'
            });
            
            // Find the issue that matches this PR
            const relatedIssue = issues.data.find(issue => 
              issue.title.includes(`[PR #${pr.number}]`)
            );
            
            if (relatedIssue) {
              const closeReason = pr.merged ? 'merged' : 'closed without merging';
              const statusEmoji = pr.merged ? '✅' : '❌';
              
              // Add closing comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: relatedIssue.number,
                body: `${statusEmoji} Pull Request #${pr.number} was ${closeReason}.\n\nClosing this tracking issue automatically.`
              });
              
              // Close the issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: relatedIssue.number,
                state: 'closed',
                state_reason: pr.merged ? 'completed' : 'not_planned'
              });
              
              console.log(`Closed issue #${relatedIssue.number} for PR #${pr.number}`);
            } else {
              console.log(`No related issue found for PR #${pr.number}`);
            }

